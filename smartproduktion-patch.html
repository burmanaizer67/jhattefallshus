  @media (max-width: 1080px) {

    .JHCredItem:last-child { border-bottom: 0; }
    .JHMobileStickyCTA { display: flex; }

</style>

<script>
(function () {
  function q(sel, root) { return (root || document).querySelector(sel); }
  function qa(sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }

  function getLogoSrc() {
    var isGithubPages = /github\.io$/i.test(window.location.hostname || "");
    var isFilePreview = (window.location.protocol || "") === "file:";
    if (!isGithubPages && !isFilePreview) return "";

    if (isFilePreview) return "./logotyp-jh-attefallshus.png";

    var segments = (window.location.pathname || "/").split("/").filter(Boolean);
    var repoBase = segments.length > 0 ? "/" + segments[0] : "";
    return repoBase + "/logotyp-jh-attefallshus.png";
  }

  function getOfferHref() {
    var defaultHref = "/offertf%C3%B6rfr%C3%A5gan";
    var isGithubPages = /github\.io$/i.test(window.location.hostname || "");
    var isFilePreview = (window.location.protocol || "") === "file:";
    if (!isGithubPages && !isFilePreview) return defaultHref;

    if (isFilePreview) return "#kontakt";

    var segments = (window.location.pathname || "/").split("/").filter(Boolean);
    var repoBase = segments.length > 0 ? "/" + segments[0] : "";
    return repoBase + "/#kontakt";
  }

  function normalizeOfferLinksForPreview() {
    var offerHref = getOfferHref();
    if (offerHref === "/offertf%C3%B6rfr%C3%A5gan") return;

    qa("a[href^='/offert']").forEach(function (a) {
      a.setAttribute("href", offerHref);
    });

    qa("[data-href^='/offert']").forEach(function (el) {
      el.setAttribute("data-href", offerHref);
    });
  }

  function readHeroVariantFromQuery() {
    try {
      var params = new URLSearchParams(window.location.search);
      var v = (params.get("ab") || "").toLowerCase();
      if (v === "hero-a") return "a";
      if (v === "hero-b") return "b";
    } catch (e) {}
    return "";
  }

  function resolveHeroVariant() {
    var fromQuery = readHeroVariantFromQuery();
    if (fromQuery) {
      localStorage.setItem("jh_hero_variant", fromQuery);
      return fromQuery;
    }

    var stored = localStorage.getItem("jh_hero_variant");
    if (stored === "a" || stored === "b") return stored;

    var assigned = Math.random() < 0.5 ? "a" : "b";
    localStorage.setItem("jh_hero_variant", assigned);
    return assigned;
  }

  function safeSetText(sel, text) {
    var el = q(sel);
    if (el) el.textContent = text;
  }

  function ensureHeroUpdate() {
    safeSetText(
      ".VideoHeader-video_header_8894 .header-custom-html-content h1",
      "Nyckelfärdiga Attefallshus med fast pris och trygg process"
    );

    safeSetText(
      ".VideoHeader-video_header_8894 .header-custom-html-content p.text-color-white",
      "Från idé till färdigt hus med fast pris, tydlig plan och snabb återkoppling."
    );

    var heroBtnText = q(".VideoHeader-video_header_8894 .SmartButtonText");
    if (heroBtnText) heroBtnText.textContent = "Få offert nu";

    var heroBtn = q(".VideoHeader-video_header_8894 .SmartButton");
    if (heroBtn) heroBtn.setAttribute("data-href", getOfferHref());

    var btnContainer = q(".VideoHeader-video_header_8894 .HeaderEntrance .mt-3");
    var heroContent = q(".VideoHeader-video_header_8894 .header-custom-html-content");

    if (!heroBtn && !q(".JHPrimaryHeroBtn")) {
      var primary = document.createElement("a");
      primary.className = "JHPrimaryHeroBtn";
      primary.href = getOfferHref();
      primary.textContent = "Få offert nu";
      primary.style.display = "inline-flex";
      primary.style.alignItems = "center";
      primary.style.justifyContent = "center";
      primary.style.minHeight = "44px";
      primary.style.padding = "0 18px";
      primary.style.borderRadius = "999px";
      primary.style.background = "linear-gradient(135deg, #c37c2b, #ab6b2a)";
      primary.style.color = "#fff";
      primary.style.fontWeight = "700";
      primary.style.textDecoration = "none";

      if (btnContainer) {
        btnContainer.appendChild(primary);
      } else if (heroContent) {
        var row = document.createElement("div");
        row.style.marginTop = "12px";
        row.appendChild(primary);
        heroContent.appendChild(row);
      }
    }

    if (btnContainer && !q(".JHSecondaryHeroBtn", btnContainer.parentNode)) {
      var sec = document.createElement("a");
      sec.className = "JHSecondaryHeroBtn btn btn-regular btn-medium";
      sec.href = "/vara-tjanster/attefallshus";
      sec.style.marginLeft = "10px";
      sec.textContent = "Se våra husmodeller";
      btnContainer.appendChild(sec);
    }

    var trustSlot = q(".VideoHeader-video_header_8894 .header-custom-html-content");
    if (trustSlot && !q(".JHTrustQuick", trustSlot)) {
      var wrap = document.createElement("div");
      wrap.className = "JHTrustQuick";
      wrap.innerHTML = ""
        + "<div class='JHTrustQuickItem'>Fast pris</div>"
        + "<div class='JHTrustQuickItem'>Tydlig process</div>"
        + "<div class='JHTrustQuickItem'>Erfaren byggpartner</div>";
      trustSlot.appendChild(wrap);
    }
  }

  function applyHeroVariant() {
    var variant = resolveHeroVariant();
    var titleEl = q(".VideoHeader-video_header_8894 .header-custom-html-content h1");
    var subEl = q(".VideoHeader-video_header_8894 .header-custom-html-content p.text-color-white");
    var btnTextEl = q(".VideoHeader-video_header_8894 .SmartButtonText");
    var fallbackBtn = q(".JHPrimaryHeroBtn");

    if (variant === "b") {
      if (titleEl) titleEl.textContent = "Bygg Attefallshus snabbare med fast pris";
      if (subEl) subEl.textContent = "Välj modell, få tydligt pris och kom igång direkt.";
      if (btnTextEl) btnTextEl.textContent = "Se pris och få offert";
      if (fallbackBtn) fallbackBtn.textContent = "Se pris och få offert";
    } else if (fallbackBtn) {
      fallbackBtn.textContent = "Få offert nu";
    }

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: "jh_hero_variant", variant: variant });
  }

  function ensureNavCta() {
    qa("a[href='/offertf%C3%B6rfr%C3%A5gan'], a[href$='#kontakt']").forEach(function (a) {
      if (a.textContent.trim().toLowerCase().indexOf("offert") === -1) {
        a.textContent = "Få offert";
      }
    });
  }

  function applyHeaderLogo() {
    var logoSrc = getLogoSrc();
    if (!logoSrc) return;

    var candidates = qa(".site-header .logo, header .logo, .Navbar a[href='/'], .TopBar a[href='/'], header a[href='/']");
    if (!candidates.length) return;

    var target = candidates[0];
    if (!target || q("img", target)) return;

    target.style.display = "inline-flex";
    target.style.alignItems = "center";
    target.style.gap = "10px";

    var img = document.createElement("img");
    img.src = logoSrc;
    img.alt = "JH Attefallshus logotyp";
    img.loading = "eager";
    img.decoding = "async";
    img.style.height = "34px";
    img.style.width = "auto";
    img.style.display = "block";

    var text = document.createElement("span");
    text.textContent = (target.textContent || "").trim() || "JH Attefallshus";

    target.textContent = "";
    target.appendChild(img);
    target.appendChild(text);
  }

  function insertCredBand() {
    var header = q(".VideoHeader-video_header_8894");
    if (!header || q(".JHCredBand")) return;

    var band = document.createElement("section");
    band.className = "JHCredBand";
    band.innerHTML = ""
      + "<div class='JHCredBandInner'>"
      + "<div class='JHCredItem'><strong>20+ års erfarenhet</strong><span>Gedigen byggteknisk kompetens.</span></div>"
      + "<div class='JHCredItem'><strong>Fast pris</strong><span>Tydlig offert med klara ramar.</span></div>"
      + "<div class='JHCredItem'><strong>Nyckelfärdiga lösningar</strong><span>Helhetsansvar genom hela projektet.</span></div>"
      + "<div class='JHCredItem'><strong>Stockholm till Halmstad</strong><span>Leverans i ett brett geografiskt område.</span></div>"
      + "<div class='JHCredItem'><strong>Personlig kontakt</strong><span>Samma kontakt från start till mål.</span></div>"
      + "</div>";

    header.insertAdjacentElement("afterend", band);
  }

  function insertWhyUs() {
    if (q(".JHWhyUs")) return;
    var target = q(".OurServices");
    if (!target) return;

    var section = document.createElement("section");
    section.className = "JHWhyUs";
    section.innerHTML = ""
      + "<h2>Därför väljer kunder JH Attefallshus</h2>"
      + "<div class='JHWhyUsGrid'>"
      + "<article class='JHWhyCard'><h3>Tydlig projektledning</h3><p>Du vet alltid nästa steg, tidplan och ansvar.</p></article>"
      + "<article class='JHWhyCard'><h3>Professionell kommunikation</h3><p>Snabba svar och raka besked under hela resan.</p></article>"
      + "<article class='JHWhyCard'><h3>Byggteknisk kompetens</h3><p>Erfarenhet som skapar trygghet i beslut och genomförande.</p></article>"
      + "<article class='JHWhyCard'><h3>Flexibla lösningar</h3><p>Anpassningar utifrån tomt, behov och budget.</p></article>"
      + "<article class='JHWhyCard'><h3>Kvalitet över tid</h3><p>Genomtänkta materialval och robust byggnation.</p></article>"
      + "<article class='JHWhyCard'><h3>Trygg process</h3><p>Från första kontakt till färdigt resultat utan krangel.</p></article>"
      + "</div>";

    target.insertAdjacentElement("beforebegin", section);
  }

  function enhanceModelCards() {
    // Collect cards from model and project blocks and place all images in one section.
    function consolidateAllHouseCards() {
      var sourceCards = [];
      var seenImage = {};

      qa(".ServicesInline-services_inline_5282 article, .OnlySectionArticles .SectionArticle, .LargeBlockWithMultipleItems .SectionArticle").forEach(function (card) {
        var img = q("img", card);
        if (!img) return;
        var src = (img.getAttribute("src") || "").split("?")[0];
        if (!src || seenImage[src]) return;
        seenImage[src] = true;
        sourceCards.push(card);
      });

      if (!sourceCards.length) return;

      var insertionPoint = q(".JHWhyUs") || q(".OurServices") || q(".ServicesInline-services_inline_5282");
      if (!insertionPoint) return;

      var unified = q(".JHUnifiedModels");
      if (!unified) {
        unified = document.createElement("section");
        unified.className = "JHUnifiedModels";
        unified.innerHTML = "<h2>Hitta rätt modell och få fast pris snabbt</h2><p>Jämför våra populäraste modeller och ta nästa steg direkt.</p><div class='services-grid'></div>";
        insertionPoint.insertAdjacentElement("afterend", unified);
      }

      var grid = q(".services-grid", unified);
      if (!grid) return;
      grid.innerHTML = "";

      sourceCards.slice(0, 6).forEach(function (card) {
        var clone = card.cloneNode(true);
        clone.classList.add("JHUnifiedCard");
        grid.appendChild(clone);
      });

      // Hide all original content sections that include house cards to avoid split layout.
      qa(".ServicesInline, .OnlySectionArticles, .LargeBlockWithMultipleItems").forEach(function (section) {
        if (section.contains(unified) || section === unified) return;
        if (q("a[href*='/attefallshus/']", section)) {
          section.style.display = "none";
        }
      });
    }

    consolidateAllHouseCards();

    var modelMap = {
      "Solglanta 30": { size: "30 m2", use: "Gasthus/Uthyrning", price: "Pris från 995 000 kr" },
      "Manviken 40": { size: "40 m2", use: "Permanent/Fritid", price: "Pris från 1 195 000 kr" },
      "Vindhagen 50": { size: "50 m2", use: "Familj/Kontor", price: "Pris från 1 395 000 kr" },
      "Stjarnvik 50": { size: "50 m2", use: "Permanent/Fritid", price: "Pris från 1 425 000 kr" },
      "Fjordhem 76": { size: "76 m2", use: "Familjeboende", price: "Pris från 1 995 000 kr" },
      "Solmark 120": { size: "120 m2", use: "Permanentboende", price: "Pris från 2 495 000 kr" }
    };

    qa(".JHUnifiedModels article, .ServicesInline-services_inline_5282 article").forEach(function (card) {
      if (q(".JHModelMeta", card)) return;

      var titleEl = q("h3", card);
      if (!titleEl) return;
      var title = (titleEl.textContent || "").trim();
      var meta = modelMap[title];
      if (!meta) return;

      var wrap = q(".article-content-wrapper", card);
      if (!wrap) return;

      var metaEl = document.createElement("div");
      metaEl.className = "JHModelMeta";
      metaEl.innerHTML = "<span class='JHBadge'>" + meta.size + "</span><span class='JHBadge'>" + meta.use + "</span>";

      var priceEl = document.createElement("div");
      priceEl.className = "JHPriceFrom";
      priceEl.textContent = meta.price;

      var p = q("p", wrap);
      if (p) p.insertAdjacentElement("afterend", metaEl);
      metaEl.insertAdjacentElement("afterend", priceEl);
    });

    var oldCta = q(".JHSectionCTA");
    if (oldCta) oldCta.remove();
  }

  function consolidateAllImagesIntoOneSection() {
    // Legacy no-op: image unification is now handled in enhanceModelCards.
  }

  function insertUnifiedAfterCta() {
    var models = q(".JHUnifiedModels");
    if (!models) return;

    var section = q(".JHUnifiedAfterCTA");
    if (!section) {
      section = document.createElement("section");
      section.className = "JHUnifiedAfterCTA";
      section.innerHTML = ""
        + "<div class='JHUnifiedAfterCTAInner'>"
        + "<div class='JHUnifiedAfterProof'>"
        + "<span class='JHBadge'>Fast pris</span>"
        + "<span class='JHBadge'>Snabb återkoppling</span>"
        + "<span class='JHBadge'>Personlig rådgivning</span>"
        + "</div>"
        + "<a class='btn btn-primary btn-medium' href='" + getOfferHref() + "'>Få offert nu</a>"
        + "</div>";
      models.insertAdjacentElement("afterend", section);
    }
  }

    if (q(".JHProcess")) return;
    var reviews = q(".SmartReviews-reviews_8874");
    if (!reviews) return;

    var section = document.createElement("section");
    section.className = "JHProcess";
    section.innerHTML = ""
      + "<h2>Från första kontakt till färdigt hus</h2>"
      + "<div class='JHProcessGrid'>"
      + "<article class='JHProcessStep'><div class='nr'>1</div><h3>Förfrågan</h3><p>Du skickar behov och mål.</p></article>"
      + "<article class='JHProcessStep'><div class='nr'>2</div><h3>Rådgivning och offert</h3><p>Du får fast pris och tydligt upplägg.</p></article>"
      + "<article class='JHProcessStep'><div class='nr'>3</div><h3>Modellval</h3><p>Vi bekräftar modell och detaljer.</p></article>"
      + "<article class='JHProcessStep'><div class='nr'>4</div><h3>Produktion</h3><p>Bygget genomförs med löpande status.</p></article>"
      + "<article class='JHProcessStep'><div class='nr'>5</div><h3>Färdigt hus</h3><p>Klart för inflyttning eller uthyrning.</p></article>"
      + "</div>"
      + "<div class='JHInlineContactInner' style='margin-top:12px;'>"
      + "<p>Redo att ta nästa steg?</p>"
      + "<div class='JHInlineContactBtns'>"
      + "<a class='primary' href='" + getOfferHref() + "'>Få offert nu</a>"
      + "<a class='secondary' href='/sida/kontakta-oss'>Kontakta oss</a>"
      + "</div>"
      + "</div>";

    reviews.insertAdjacentElement("beforebegin", section);
  }

  function tuneFaqCopy() {
    var map = {
      "Vad kostar det att bygga ett Attefallshus med er?": "Vad kostar ett attefallshus?",
      "Hur lang tid tar det att bygga mitt nya Attefallshus?": "Hur lång är leveranstiden?",
      "Var kan man anlita er för era tjänster?": "Levererar ni i hela Sverige?"
    };

    qa(".SmartFaqs h3").forEach(function (h) {
      var t = (h.textContent || "").trim();
      if (map[t]) h.textContent = map[t];
    });
  }

  function insertBottomCtaBeforeFooter() {
    var existing = q(".JHBottomCTA");
    if (existing) {
      if (!existing.id) existing.id = "kontakt";
      return;
    }
    var footer = q(".footer");
    if (!footer) return;

    var cta = document.createElement("section");
    cta.className = "JHBottomCTA";
    cta.id = "kontakt";
    cta.innerHTML = ""
      + "<div class='JHBottomCTAInner'>"
      + "<h2>Berätta vad du vill bygga så återkommer vi snabbt med offert</h2>"
      + "<p>Kort förfrågan räcker. Du får tydligt pris och nästa steg snabbt.</p>"
      + "<div class='JHBottomCTABtns'>"
      + "<a class='primary' href='" + getOfferHref() + "'>Få offert nu</a>"
      + "<a class='secondary' href='/sida/kontakta-oss'>Kontakta oss</a>"
      + "</div>"
      + "</div>";

    footer.insertAdjacentElement("beforebegin", cta);
  }

  function ensureMobileStickyCta() {
    if (q(".JHMobileStickyCTA")) return;
    var bar = document.createElement("div");
    bar.className = "JHMobileStickyCTA";
    bar.innerHTML = ""
      + "<a class='a' href='tel:0702754702'>Ring</a>"
      + "<a class='b' href='" + getOfferHref() + "'>Få offert nu</a>";
    document.body.appendChild(bar);
  }

  function insertContactAfterReviews() {
    var reviews = q(".SmartReviews-reviews_8874");
    if (!reviews || q(".JHInlineContact")) return;

    var section = document.createElement("section");
    section.className = "JHInlineContact";
    section.innerHTML = ""
      + "<div class='JHInlineContactInner'>"
      + "<p>Nöjd med det du ser? Ta nästa steg idag.</p>"
      + "<div class='JHInlineContactBtns'>"
      + "<a class='primary' href='" + getOfferHref() + "'>Få offert nu</a>"
      + "<a class='secondary' href='/sida/kontakta-oss'>Kontakta oss</a>"
      + "</div>"
      + "</div>";

    reviews.insertAdjacentElement("afterend", section);
  }

  document.addEventListener("DOMContentLoaded", function () {
    ensureHeroUpdate();
    applyHeroVariant();
    applyHeaderLogo();
    ensureNavCta();
    insertCredBand();
    insertWhyUs();
    enhanceModelCards();
    consolidateAllImagesIntoOneSection();
    insertUnifiedAfterCta();
    insertProcessBeforeReviews();
    insertContactAfterReviews();
    tuneFaqCopy();
    insertBottomCtaBeforeFooter();
    ensureMobileStickyCta();
    normalizeOfferLinksForPreview();
  });
})();
</script>
